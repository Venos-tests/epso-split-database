<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>EPSO UNLOCKED - Official Portal</title>
    <style>
        :root { 
            --eu-blue: #003399; 
            --eu-gold: #FFCC00; 
            --bg: #f0f4f8; 
        }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: var(--bg); margin: 0; padding: 0; min-height: 100vh; color: #1a1a1a; }
        .container { max-width: 1000px; margin: 0 auto; padding: 40px 20px; }
        .view { display: none; background: white; padding: 45px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,51,153,0.1); border-top: 5px solid var(--eu-blue); min-height: 800px; box-sizing: border-box; }
        #menu-view { display: block; min-height: 800px; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--eu-gold); padding-bottom: 15px; margin-bottom: 30px; }
        .section-container { margin-bottom: 30px; }
        .pack-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; margin-top: 15px; }
        .pack-card { background: white; padding: 25px; border-radius: 10px; border: 1px solid #d1d9e6; text-align: center; font-weight: 600; cursor: pointer; transition: 0.3s; color: var(--eu-blue); box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        .pack-card:hover { background: var(--eu-blue); color: white; border-color: var(--eu-blue); transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,51,153,0.2); }
        .pack-card.empty { opacity: 0.35; cursor: not-allowed; pointer-events: none; }
        .passage-box { background: #f8fbff; padding: 25px; border-radius: 8px; border: 1px solid #e1e8f0; margin-bottom: 25px; font-style: italic; line-height: 1.8; min-height: 150px; }
        .option { padding: 15px 20px; margin: 10px 0; border: 1px solid #d1d9e6; border-radius: 8px; cursor: pointer; transition: 0.2s; background: white; }
        .option:hover { background: #f0f4ff; border-color: var(--eu-blue); }
        .selected-exam { border: 2px solid var(--eu-blue) !important; background: #eef4ff !important; }
        .correct { background: #e6ffed !important; border-color: #28a745 !important; color: #155724; font-weight: bold; }
        .wrong { background: #fff5f5 !important; border-color: #dc3545 !important; color: #721c24; }
        .btn { padding: 12px 25px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; text-transform: uppercase; }
        .btn-primary { background: var(--eu-blue); color: white; }
        .btn-gold { background: var(--eu-gold); color: #003399; }
        #mode-modal { display: none; position: fixed; inset: 0; background: rgba(0,51,153,0.4); backdrop-filter: blur(5px); align-items: center; justify-content: center; z-index: 15000; }
        .modal-content { background: white; padding: 45px; border-radius: 20px; text-align: center; width: 400px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
        #timer-box { position: fixed; top: 20px; right: 20px; background: var(--eu-blue); color: white; padding: 10px 20px; border-radius: 5px; font-weight: bold; display: none; border-bottom: 3px solid var(--eu-gold); z-index: 1001; }
        #login-screen { position: fixed; inset: 0; background: var(--eu-blue); display: flex; align-items: center; justify-content: center; z-index: 20000; }
        .login-box { background: white; padding: 40px; border-radius: 12px; text-align: center; width: 350px; }
        .hint-divider { border: none; border-top: 1px solid #eee; margin: 8px 0; }

        /* ── Exam review table ── */
        .review-table { width: 100%; border-collapse: collapse; margin-top: 25px; font-size: 0.95em; text-align: left; }
        .review-table th { background: var(--eu-blue); color: white; padding: 10px 14px; }
        .review-table td { padding: 10px 14px; border-bottom: 1px solid #e8edf5; vertical-align: top; }
        .review-table tr.row-correct { background: #e6ffed; }
        .review-table tr.row-wrong   { background: #fff5f5; }
        .review-table .badge-correct { color: #155724; font-weight: bold; }
        .review-table .badge-wrong   { color: #721c24; font-weight: bold; }
        .exp-cell { font-size: 0.88em; color: #444; line-height: 1.5; }
    </style>
</head>
<body>

<div id="timer-box">00:00</div>

<div id="login-screen">
    <div class="login-box">
        <div style="color:var(--eu-blue); font-size: 2em; font-weight: bold; margin-bottom: 15px;">EUROPEAN PORTAL</div>
        <p id="hint-el" style="font-size: 0.9em; color: #444; margin: 0 0 6px 0;"></p>
        <hr class="hint-divider">
        <p id="hint-en" style="font-size: 0.9em; color: #888; font-style: italic; margin: 6px 0 18px 0;"></p>
        <input type="text" id="pass-input" autocomplete="off" style="width:100%; padding:12px; margin-bottom:20px; border:1px solid #ccc; border-radius:4px; box-sizing: border-box;">
        <button onclick="unlock()" class="btn btn-primary" style="width:100%;">Access Portal</button>
        <p id="login-status" style="font-size:0.8em; color:#999; margin-top:10px; min-height:1.2em;"></p>
    </div>
</div>

<div id="mode-modal">
    <div class="modal-content">
        <h3 id="txt-mode-title" style="color:var(--eu-blue); margin-bottom:25px;">Επιλογή Λειτουργίας</h3>
        <button onclick="startQuiz('practice')" class="btn btn-primary" style="width:100%; margin: 10px 0;" id="btn-practice">Practice Mode</button>
        <button onclick="startQuiz('exam')" class="btn btn-gold" style="width:100%; margin: 10px 0;" id="btn-exam">Exam Mode</button>
        <button onclick="closeModal()" style="color:red; background:none; border:none; cursor:pointer; margin-top:20px;" id="btn-cancel">Ακύρωση</button>
    </div>
</div>

<div class="container">
    <div id="menu-view" class="view" style="display:block;">
        <div class="header">
            <h1 id="txt-main-title" style="color:var(--eu-blue); margin:0;">EPSO Prep Portal</h1>
            <button class="btn btn-gold" onclick="toggleLanguage()">🇬🇷 EL / 🇬🇧 EN</button>
        </div>
        <div id="all-packs"></div>
    </div>

    <div id="quiz-view" class="view">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <button onclick="backToMenu()" class="btn btn-primary" id="btn-back">Back</button>
            <div id="progress-info" style="font-weight:bold; color:var(--eu-blue);"></div>
        </div>
        <div id="passage-container" class="passage-box"></div>
        <div id="question-text" style="font-weight:bold; font-size:1.3em; margin-bottom:25px; color:var(--eu-blue);"></div>
        <div id="options-container"></div>
        <div id="explanation-area" style="display:none; margin-top:20px; padding:20px; background:#fff9e6; border-left:5px solid var(--eu-gold); border-radius:4px;"></div>
        <div style="display:flex; justify-content:space-between; margin-top:30px; border-top:1px solid #eee; padding-top:20px;">
            <button onclick="navQuestion(-1)" class="btn btn-primary" id="btn-prev">Previous</button>
            <button onclick="finishExam()" class="btn btn-gold" id="btn-finish" style="display:none;">Finish</button>
            <button onclick="navQuestion(1)" class="btn btn-primary" id="btn-next">Next</button>
        </div>
    </div>

    <div id="result-view" class="view">
        <h2 id="txt-result-title" style="border:none; text-align:center;">Results</h2>
        <div id="final-score" style="font-size:5em; color:var(--eu-blue); font-weight:bold; margin:20px 0; text-align:center;"></div>
        <div style="text-align:center; margin-bottom:30px;">
            <button onclick="backToMenu()" class="btn btn-primary" id="btn-res-back">Home</button>
        </div>
        <!-- ── per-question review (exam mode only) ── -->
        <div id="exam-review-container"></div>
    </div>
</div>

<script>
    // ============================================================
    // PASSWORD SETTINGS — only change these 4 lines!
    // ============================================================
    var correctPass    = "dataset";
    var pageNumber     = 135;
    var wordPositionEN = "last";
    var wordPositionEL = "τελευταία";
    // ============================================================

    var currentLang = 'el';
    var currentMode = '';
    var selectedTestKey = '';
    var currentIndex = 0;
    var userAnswers = {};
    var activeQuestions = [];
    var timer;
    var seconds = 0;
    var DATABASE = {};
    var dbLoaded = false;
    var userUnlocked = false;

    // ─────────────────────────────────────────────────────────────
    // FIX 1: Normalise answer values to 0-based index.
    // Some JSON entries store answer as 1-based (e.g. 5 meaning
    // the 5th option). We detect and convert on load.
    // ─────────────────────────────────────────────────────────────
    function normaliseAnswers(db) {
        Object.values(db).forEach(function(arr) {
            if (!Array.isArray(arr)) return;
            arr.forEach(function(qObj) {
                ['en', 'el'].forEach(function(lang) {
                    if (!qObj[lang]) return;
                    var q = qObj[lang];
                    // If answer >= options.length it must be 1-based — convert.
                    if (q.answer !== undefined && q.options && q.answer >= q.options.length) {
                        q.answer = q.answer - 1;
                    }
                });
            });
        });
    }

    async function loadDatabase() {
        document.getElementById('login-status').innerText = '⏳ Loading...';
        try {
            // Cache-busting: append current date (YYYYMMDD) so jsDelivr
            // serves a fresh copy each day, and immediately after a purge.
            var cb = '?v=' + new Date().toISOString().slice(0, 10).replace(/-/g, '');
            var base = "https://cdn.jsdelivr.net/gh/Venos-tests/epso-split-database@main/";
            var files = [
                base + "epso-verbal.json" + cb,
                base + "epso-numerical.json" + cb,
                base + "epso-abstract.json" + cb,
                base + "epso-eu-knowledge.json" + cb,
                base + "epso-digital-skills.json" + cb
            ];
            var results = await Promise.all(files.map(function(f) {
                return fetch(f).then(function(r) { return r.json(); });
            }));
            results.forEach(function(data) { Object.assign(DATABASE, data); });
            normaliseAnswers(DATABASE); // ← FIX 1 applied here
            dbLoaded = true;
            document.getElementById('login-status').innerText = '';
            if (userUnlocked) enterPortal();
        } catch(e) {
            document.getElementById('login-status').innerText = 'Could not load. Please refresh.';
            document.getElementById('login-status').style.color = 'red';
            console.error("DB load error:", e);
        }
    }

    function setLoginHints() {
        document.getElementById('hint-el').innerHTML =
            'Χρησιμοποιήστε ως κωδικό την <strong>' + wordPositionEL + '</strong> λέξη της σελίδας <strong>' + pageNumber + '</strong> του βιβλίου';
        document.getElementById('hint-en').innerHTML =
            'Use as password the <strong>' + wordPositionEN + '</strong> word on page <strong>' + pageNumber + '</strong> of the book';
    }

    function unlock() {
        var userInput = document.getElementById('pass-input').value.trim().toLowerCase();
        if (userInput === correctPass) {
            if (dbLoaded) { enterPortal(); }
            else { userUnlocked = true; document.getElementById('login-status').innerText = 'Please wait...'; }
        } else {
            alert('Λάθος λέξη-κλειδί! / Wrong keyword!\nCheck page ' + pageNumber + '.');
        }
    }

    function enterPortal() {
        document.getElementById('login-screen').style.display = 'none';
        updateUIStrings();
        renderMenu();
    }

    function updateUIStrings() {
        document.getElementById('txt-main-title').innerText   = currentLang === 'el' ? 'Πύλη Προετοιμασίας EPSO' : 'EPSO Prep Portal';
        document.getElementById('txt-mode-title').innerText   = currentLang === 'el' ? 'Επιλογή Λειτουργίας' : 'Select Mode';
        document.getElementById('btn-practice').innerText     = currentLang === 'el' ? 'Practice (Εξηγήσεις)' : 'Practice Mode';
        document.getElementById('btn-exam').innerText         = currentLang === 'el' ? 'Exam (Χρόνος)' : 'Exam Simulation';
        document.getElementById('btn-cancel').innerText       = currentLang === 'el' ? 'Ακύρωση' : 'Cancel';
        document.getElementById('btn-back').innerText         = currentLang === 'el' ? 'Πίσω' : 'Back';
        document.getElementById('btn-next').innerText         = currentLang === 'el' ? 'Επόμενο' : 'Next';
        document.getElementById('btn-prev').innerText         = currentLang === 'el' ? 'Προηγούμενο' : 'Previous';
        document.getElementById('btn-finish').innerText       = currentLang === 'el' ? 'Τέλος' : 'Finish';
        document.getElementById('txt-result-title').innerText = currentLang === 'el' ? 'Αποτελέσματα' : 'Results';
        document.getElementById('btn-res-back').innerText     = currentLang === 'el' ? 'Αρχική' : 'Home';
    }

    function toggleLanguage() {
        currentLang = (currentLang === 'el') ? 'en' : 'el';
        updateUIStrings();
        if (document.getElementById('quiz-view').style.display === 'block') showQuestion();
        else renderMenu();
    }

    function renderMenu() {
        var grid = document.getElementById('all-packs');
        var sections = [
            { title: 'Verbal Reasoning',    keys: ['verbal_1','verbal_2','verbal_3','verbal_4'] },
            { title: 'Numerical Reasoning', keys: ['num_1','num_2','num_3','num_4', 'num_5'] },
            { title: 'Abstract Reasoning',  keys: ['abstract_1','abstract_2','abstract_3','abstract_4'] },
            { title: 'EU Knowledge',        keys: ['eu_1','eu_2','eu_3','eu_4'] },
            { title: 'Digital Skills',      keys: ['ds_1','ds_2','ds_3','ds_4'] }
        ];
        grid.innerHTML = sections.map(function(s) {
            return '<div class="section-container">'
                + '<h2 style="color:var(--eu-blue);border-left:4px solid var(--eu-gold);padding-left:15px;">' + s.title + '</h2>'
                + '<div class="pack-grid">'
                + s.keys.map(function(k) {
                    var isEmpty = !DATABASE[k] || DATABASE[k].length === 0
                        || (DATABASE[k][0][currentLang] && DATABASE[k][0][currentLang].question.trim() === '1.');
                    var label = isEmpty
                        ? k.toUpperCase().replace('_',' ') + ' <span style="font-size:0.75em;font-weight:400;">(Coming Soon)</span>'
                        : k.toUpperCase().replace('_',' ');
                    return '<div class="pack-card' + (isEmpty ? ' empty' : '') + '" '
                        + (isEmpty ? '' : 'onclick="openModal(\'' + k + '\')"') + '>' + label + '</div>';
                }).join('')
                + '</div></div>';
        }).join('');
    }
function openModal(key) { selectedTestKey = key; document.getElementById('mode-modal').style.display = 'flex'; }
    function closeModal()   { document.getElementById('mode-modal').style.display = 'none'; }

    function startQuiz(mode) {
        currentMode = mode;
        activeQuestions = DATABASE[selectedTestKey];
        if (!activeQuestions || activeQuestions.length === 0) { alert('Empty test.'); closeModal(); return; }
        currentIndex = 0;
        userAnswers = {};
        closeModal();
        document.getElementById('menu-view').style.display = 'none';
        document.getElementById('result-view').style.display = 'none';
        document.getElementById('quiz-view').style.display = 'block';
        if (currentMode === 'exam') startTimer();
        showQuestion();
    }

    function showQuestion() {
        try {
            var qData = activeQuestions[currentIndex][currentLang];
            var expLabel = currentLang === 'el' ? 'Επεξήγηση' : 'Explanation';
            var passageBox  = document.getElementById('passage-container');
            var questionText = document.getElementById('question-text');
            var progressInfo = document.getElementById('progress-info');
            var optCont  = document.getElementById('options-container');
            var expArea  = document.getElementById('explanation-area');

            if (qData.image && qData.image.trim() !== '') {
                var imgs = '<img src="' + qData.image + '" crossorigin="anonymous" alt="Abstract reasoning figure" style="max-width:100%;border-radius:6px;border:1px solid #d1d9e6;display:block;margin:0 auto;">';
                if (qData.optionsImage && qData.optionsImage.trim() !== '') {
                    imgs += '<img src="' + qData.optionsImage + '" crossorigin="anonymous" alt="Answer options" style="max-width:100%;border-radius:6px;border:1px solid #d1d9e6;display:block;margin:20px auto 0;">';
                }
                passageBox.innerHTML = imgs;
                passageBox.style.display = 'block';
            } else if (qData.passage && qData.passage.trim() !== '') {
                passageBox.innerHTML = qData.passage;
                passageBox.style.display = 'block';
            } else {
                passageBox.style.display = 'none';
            }

            if (progressInfo) progressInfo.innerText = (currentIndex + 1) + ' / ' + activeQuestions.length;
            if (questionText) questionText.innerText = qData.question;

            if (optCont) {
                optCont.innerHTML = '';
                qData.options.forEach(function(opt, idx) {
                    var div = document.createElement('div');
                    div.className = 'option';
                    div.innerText = opt;
                    if (userAnswers[currentIndex] !== undefined) {
                        var isSelected = userAnswers[currentIndex] === idx;
                        var isCorrect  = idx === qData.answer;
                        if (currentMode === 'exam') {
                            if (isSelected) div.classList.add('selected-exam');
                        } else {
                            // practice: always green on correct, red on wrong selection
                            if (isCorrect) div.classList.add('correct');
                            else if (isSelected) div.classList.add('wrong');
                        }
                    }
                    div.onclick = function() {
                        if (userAnswers[currentIndex] !== undefined) {
                            // practice: locked after first answer; exam: allow changing
                            if (currentMode === 'practice') return;
                        }
                        userAnswers[currentIndex] = idx;
                        showQuestion();
                    };
                    optCont.appendChild(div);
                });
            }

            if (expArea) {
                if (currentMode === 'practice' && userAnswers[currentIndex] !== undefined && qData.explanation) {
                    expArea.innerHTML = '<strong>' + expLabel + ':</strong> ' + qData.explanation;
                    expArea.style.display = 'block';
                } else {
                    expArea.style.display = 'none';
                }
            }

            document.getElementById('btn-finish').style.display = (currentIndex === activeQuestions.length - 1) ? 'inline-block' : 'none';
            document.getElementById('btn-next').style.display   = (currentIndex === activeQuestions.length - 1) ? 'none' : 'inline-block';
            document.getElementById('btn-prev').style.display   = (currentIndex === 0) ? 'none' : 'inline-block';

        } catch(error) {
            console.error('Error in showQuestion:', error);
        }
    }

    function navQuestion(dir) {
        currentIndex += dir;
        if (currentIndex < 0) currentIndex = 0;
        if (currentIndex >= activeQuestions.length) currentIndex = activeQuestions.length - 1;
        showQuestion();
    }

    function startTimer() {
        var totalSeconds = getTimerLimit();
        seconds = totalSeconds;
        var timerBox = document.getElementById('timer-box');
        if (timerBox) timerBox.style.display = 'block';
        timer = setInterval(function() {
            seconds--;
            var m = Math.floor(seconds / 60);
            var s = seconds % 60;
            if (timerBox) timerBox.innerText = m + ':' + (s < 10 ? '0' + s : s);
            if (seconds <= 0) { clearInterval(timer); finishExam(); }
        }, 1000);
    }

    function getTimerLimit() {
        if (selectedTestKey.startsWith('num'))      return 10 * 120;
        if (selectedTestKey.startsWith('verbal'))   return 20 * 110;
        if (selectedTestKey.startsWith('eu'))       return 30 * 80;
        if (selectedTestKey.startsWith('ds'))       return 20 * 45;
        if (selectedTestKey.startsWith('abstract')) return 10 * 60;
        return 20 * 60;
    }

    // ─────────────────────────────────────────────────────────────
    // FIX 2: finishExam — show score PLUS per-question review table
    // ─────────────────────────────────────────────────────────────
    function finishExam() {
        clearInterval(timer);
        var timerBox = document.getElementById('timer-box');
        if (timerBox) timerBox.style.display = 'none';

        var score = 0;
        activeQuestions.forEach(function(q, i) {
            if (userAnswers[i] === q[currentLang].answer) score++;
        });

        document.getElementById('quiz-view').style.display = 'none';
        document.getElementById('result-view').style.display = 'block';
        document.getElementById('final-score').innerText = score + ' / ' + activeQuestions.length;

        // Build the per-question review table
        var isEl = currentLang === 'el';
        var reviewHTML = '<table class="review-table"><thead><tr>'
            + '<th>#</th>'
            + '<th>' + (isEl ? 'Ερώτηση' : 'Question') + '</th>'
            + '<th>' + (isEl ? 'Απάντησή σας' : 'Your Answer') + '</th>'
            + '<th>' + (isEl ? 'Σωστή' : 'Correct') + '</th>'
            + '<th>' + (isEl ? 'Επεξήγηση' : 'Explanation') + '</th>'
            + '</tr></thead><tbody>';

        activeQuestions.forEach(function(qObj, i) {
            var q = qObj[currentLang];
            var userIdx   = userAnswers[i];
            var correctIdx = q.answer;
            var isCorrect  = userIdx === correctIdx;
            var rowClass   = isCorrect ? 'row-correct' : 'row-wrong';
            var icon       = isCorrect ? '✅' : '❌';
            var yourAnswer = userIdx !== undefined ? q.options[userIdx] : (isEl ? '—' : '—');
            var correctAnswer = q.options[correctIdx] !== undefined ? q.options[correctIdx] : '?';

            reviewHTML += '<tr class="' + rowClass + '">'
                + '<td style="white-space:nowrap;">' + icon + ' ' + (i + 1) + '</td>'
                + '<td>' + q.question + '</td>'
                + '<td class="' + (isCorrect ? 'badge-correct' : 'badge-wrong') + '">' + yourAnswer + '</td>'
                + '<td class="badge-correct">' + correctAnswer + '</td>'
                + '<td class="exp-cell">' + (q.explanation || '—') + '</td>'
                + '</tr>';
        });

        reviewHTML += '</tbody></table>';
        document.getElementById('exam-review-container').innerHTML = reviewHTML;
    }

    function backToMenu() {
        clearInterval(timer);
        var timerBox = document.getElementById('timer-box');
        if (timerBox) timerBox.style.display = 'none';
        document.getElementById('quiz-view').style.display = 'none';
        document.getElementById('result-view').style.display = 'none';
        document.getElementById('exam-review-container').innerHTML = '';
        document.getElementById('menu-view').style.display = 'block';
    }

    document.addEventListener("DOMContentLoaded", function() {
        setLoginHints();
        updateUIStrings();
        loadDatabase();
    });
</script>
</body>
</html>
