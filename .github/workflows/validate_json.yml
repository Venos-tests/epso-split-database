name: JSON Database Validation

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Run Syntax Check
      run: |
        python -c "
        import json, glob, sys
        files = glob.glob('**/*.json', recursive=True)
        errors = 0
        for f_path in files:
            try:
                with open(f_path, 'r', encoding='utf-8') as f:
                    json.load(f)
            except Exception as e:
                print(f'Error in {f_path}: {e}')
                errors += 1
        if errors > 0:
            sys.exit(1)
        print('All JSON files are structurally perfect!')
        "
